# Docker Compose overlay: mounts a tunnel-patched vc-config for vc-apigw and
# vc-issuer, so credential offers embed a credential_issuer/token_endpoint
# reachable from a real device over the internet, instead of the internal-only
# "https://vc-proxy:8443" baked into the base fixtures/vc-config.yaml (vc-proxy
# only exists in docker-compose.conformance.yml, not this stack).
#
# Applied automatically by `make up TUNNELS=yes VC=yes` (or FACETEC=yes, which
# implies VC=yes) — see the Makefile's `up:` target, which regenerates
# fixtures/vc-config-tunnel.yaml via scripts/generate-tunnel-config.py before
# starting containers.
#
# Requires: fixtures/vc-config-tunnel.yaml to already exist (generated by the
# Makefile). Do not use this overlay standalone without that generation step —
# vc-apigw will fail to start if the file is missing.

services:
  vc-apigw:
    volumes:
      - ./fixtures/vc-config-tunnel.yaml:/config.yaml:ro

  vc-issuer:
    volumes:
      - ./fixtures/vc-config-tunnel.yaml:/config.yaml:ro
