# Docker Compose overlay for VC services with Cloudflare tunnel URLs.
#
# Overrides the vc-config.yaml volume mount to use the tunnel-patched version,
# which replaces localhost:9001 verifier URLs with Cloudflare tunnel URLs
# reachable from mobile devices.
#
# Usage:
#   make up VC=yes TUNNELS=yes
#
# Requires: fixtures/.vc-config.tunnel.yaml (generated by scripts/generate-vc-tunnel-config.sh)

services:
  vc-verifier:
    volumes:
      - ./fixtures/.vc-config.tunnel.yaml:/config.yaml:ro

  vc-issuer:
    volumes:
      - ./fixtures/.vc-config.tunnel.yaml:/config.yaml:ro

  vc-apigw:
    volumes:
      - ./fixtures/.vc-config.tunnel.yaml:/config.yaml:ro

  vc-registry:
    volumes:
      - ./fixtures/.vc-config.tunnel.yaml:/config.yaml:ro
