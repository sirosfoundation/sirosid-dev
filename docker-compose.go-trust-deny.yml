# Override to use go-trust-deny as the trust PDP
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.go-trust.yml -f docker-compose.go-trust-deny.yml up -d
#
# This overrides wallet-backend to use the never-trusted registry.
# All credential issuance operations should fail with untrusted issuer error.
# Note: wallet-backend is on the Docker network, so we use the service name.

services:
  wallet-backend:
    environment:
      - WALLET_TRUST_PDP_URL=http://go-trust-deny:6001
      - WALLET_TRUST_ENABLED=true
    depends_on:
      go-trust-deny:
        condition: service_healthy
