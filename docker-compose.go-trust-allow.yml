# Override to use go-trust-allow as the trust PDP
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.go-trust.yml -f docker-compose.go-trust-allow.yml up -d
#
# This overrides wallet-backend to use the always-trusted registry.
# Note: wallet-backend is on the Docker network, so we use the service name.

services:
  wallet-backend:
    environment:
      - WALLET_TRUST_PDP_URL=http://go-trust-allow:6001
      - WALLET_TRUST_ENABLED=true
    depends_on:
      go-trust-allow:
        condition: service_healthy
