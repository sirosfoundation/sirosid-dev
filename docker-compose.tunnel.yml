# Docker Compose overlay for Cloudflare tunnel URLs.
#
# Unlike docker-compose.domain.yml (which uses a single hostname), tunnels
# assign a unique *.trycloudflare.com URL per service. This overlay injects
# those URLs into the frontend and backend configuration.
#
# Usage (generated by 'make restart-with-tunnels'):
#   source .env.tunnel
#   docker compose -f docker-compose.test.yml -f docker-compose.tunnel.yml up -d
#
# Requires: .env.tunnel file with TUNNEL_FRONTEND_URL, TUNNEL_BACKEND_URL,
# TUNNEL_ENGINE_URL (created by scripts/tunnel.sh)

services:
  wallet-frontend:
    environment:
      - WALLET_BACKEND_URL=${TUNNEL_BACKEND_URL}
      - WALLET_ENGINE_URL=${TUNNEL_ENGINE_URL}
      - WEBAUTHN_RPID=${TUNNEL_RPID}
      - OPENID4VCI_REDIRECT_URI=${TUNNEL_FRONTEND_URL}/
      - STATIC_PUBLIC_URL=${TUNNEL_FRONTEND_URL}
      - VCT_REGISTRY_URL=${TUNNEL_BACKEND_URL}/registry/type-metadata

  wallet-backend:
    environment:
      # Extract hostname from tunnel URL for WebAuthn RP ID
      - WALLET_SERVER_RP_ID=${TUNNEL_RPID:-trycloudflare.com}
      - WALLET_SERVER_RP_ORIGIN=${TUNNEL_FRONTEND_URL}
      - WALLET_SERVER_RP_ORIGINS=${TUNNEL_FRONTEND_URL},android:apk-key-hash:xAfybcO0yPlUA_Gko2tH6oIRb9Y-qa3uVtm0m_qW07Q
