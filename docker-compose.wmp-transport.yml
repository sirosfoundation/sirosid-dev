# Override to force WMP transport for the wallet frontend.
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.wmp-transport.yml up -d --build
#
# This sets VITE_TRANSPORT_PREFERENCE=wmp so the frontend uses
# the WMP JSON-RPC transport instead of WebSocket or HTTP proxy.

services:
  wallet-frontend:
    build:
      args:
        - VITE_TRANSPORT_PREFERENCE=wmp
        - VITE_ALLOWED_TRANSPORTS=wmp
        - VITE_WMP_RPC_URL=http://localhost:8082/api/v2/wallet/rpc
        - VITE_WMP_EVENTS_URL=http://localhost:8082/api/v2/wallet/events
