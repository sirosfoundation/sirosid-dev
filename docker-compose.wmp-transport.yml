# Override to force WMP transport for the wallet frontend.
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.wmp-transport.yml up -d --build
#
# This sets TRANSPORT_PREFERENCE=wmp so the frontend uses
# the WMP JSON-RPC transport instead of WebSocket or HTTP proxy.
# WMP URLs are derived from WALLET_ENGINE_URL at runtime.

services:
  wallet-frontend:
    environment:
      - TRANSPORT_PREFERENCE=wmp
      - ALLOWED_TRANSPORTS=wmp
