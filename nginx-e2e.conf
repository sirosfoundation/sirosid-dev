server {
    listen 80;
    absolute_redirect off;

    root /usr/share/nginx/html;

    # Serve a startup/dashboard page at /
    location = / {
        root /usr/share/nginx;
        try_files /startup.html =404;
        # Override CSP to allow inline styles/scripts on the dashboard page
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Serve build metadata for the startup page
    location = /build-info.json {
        default_type application/json;
        alias /usr/share/nginx/build-info.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Digital Asset Links for Android passkey development.
    # Generated by: scripts/setup-android.sh
    # Only served when the file exists (volume-mounted from .well-known/).
    location = /.well-known/assetlinks.json {
        default_type application/json;
        alias /usr/share/nginx/assetlinks.json;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Proxy health checks for the startup dashboard (same-origin).
    # Using variables so nginx resolves at request time, not startup —
    # services that aren't running yet simply return 502.
    resolver 127.0.0.11 valid=5s ipv6=off;

    location = /_health/backend       { set $up_backend http://wallet-backend:8080;         proxy_pass $up_backend/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/admin         { set $up_admin http://wallet-backend:8081;            proxy_pass $up_admin/admin/status; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/engine        { set $up_engine http://wallet-backend:8082;           proxy_pass $up_engine/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/mock-pdp      { set $up_pdp http://mock-trust-pdp:9081;              proxy_pass $up_pdp/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/mock-verifier { set $up_mockv http://mock-verifier:9011;             proxy_pass $up_mockv/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/registry      { set $up_reg http://wallet-backend:8080;              proxy_pass $up_reg/registry/status; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/go-trust      { set $up_gotrust http://go-trust-allow:6001;           proxy_pass $up_gotrust/healthz; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/vc-issuer     { set $up_issuer http://vc-issuer:8080;                proxy_pass $up_issuer/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/vc-verifier   { set $up_vcverifier http://vc-verifier:8080;          proxy_pass $up_vcverifier/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }
    location = /_health/vc-apigw      { set $up_apigw http://vc-apigw:8080;                  proxy_pass $up_apigw/health; proxy_connect_timeout 2s; proxy_read_timeout 2s; }

    # Conformance runner API proxy
    location /_conformance/ {
        set $up_runner http://conformance-runner:3001;
        rewrite ^/_conformance/(.*)$ /$1 break;
        proxy_pass $up_runner;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Serve assets and static files from any /id/<tenant>/ prefix
    # by stripping the prefix and serving from the root.
    location ~ ^/id/[^/]+/(.+\.(js|css|svg|png|ico|json|woff2?|ttf|webmanifest|map|webm))$ {
        try_files /$1 =404;
    }

    # SPA fallback: all /id/<tenant>/* routes serve index.html
    location / {
        try_files $uri /index.html;
    }
}
