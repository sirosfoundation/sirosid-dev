server {
    listen 80;
    absolute_redirect off;

    root /usr/share/nginx/html;

    # Serve a startup/dashboard page at /
    location = / {
        root /usr/share/nginx;
        try_files /startup.html =404;
    }

    # Serve build metadata for the startup page
    location = /build-info.json {
        default_type application/json;
        alias /usr/share/nginx/build-info.json;
    }

    # Serve assets and static files from any /id/<tenant>/ prefix
    # by stripping the prefix and serving from the root.
    location ~ ^/id/[^/]+/(.+\.(js|css|svg|png|ico|json|woff2?|ttf|webmanifest|map|webm))$ {
        try_files /$1 =404;
    }

    # SPA fallback: all /id/<tenant>/* routes serve index.html
    location / {
        try_files $uri /index.html;
    }
}
