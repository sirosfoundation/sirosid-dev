# VC Services Configuration for E2E Testing
#
# This configuration file is used by the VC issuer, verifier, apigw, and
# registry services when running end-to-end tests with production-grade
# credential services.
#
# Key differences from production config:
# - Uses localhost URLs (services run on local ports via Docker port mapping)
# - TLS disabled for simplicity
# - Uses OIDC auth provider pointing at a mock (or Keycloak in future)
# - Bootstrap data imported from vc repo's bootstrapping/ directory
#
# Service Ports:
#   - 9000: vc-issuer (OpenID4VCI)
#   - 9001: vc-verifier (OpenID4VP + OIDC)
#   - 9003: vc-apigw (API Gateway / OAuth AS)
#   - 9004: vc-registry (Status Lists)

---
common:
  production: false
  ha:
    enable: true
  mongo:
    uri: mongodb://mongodb:27017
  tracing:
    addr: "localhost:4318"
    timeout: 1
  credential_metadata:
    pid_1_8:
      vctm_file_path: "/metadata/vctm_pid_arf_1_8.json"
      format: "dc+sd-jwt"
    pid_1_5:
      vctm_file_path: "/metadata/vctm_pid_arf_1_5.json"
      format: "dc+sd-jwt"
    ehic:
      vctm_file_path: "/metadata/vctm_ehic.json"
      format: "dc+sd-jwt"
    diploma:
      vctm_file_path: "/metadata/vctm_diploma.json"
      format: "dc+sd-jwt"
    siros_id:
      vctm_file_path: "/metadata/vctm_siros_id.json"
      format: "dc+sd-jwt"

kafka:
  enabled: false
  brokers:
    - "kafka0:9092"

# =============================================================================
# API Gateway (apigw) - OAuth2 Authorization Server for OpenID4VCI
# =============================================================================
apigw:
  api_server:
    addr: ":8080"
    tls:
      enable: false
    cors:
      allowed_origins:
        - "http://localhost:3000"
        - "http://localhost:*"
        - "https://vc-proxy:8443"
      allowed_methods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowed_headers:
        - "Authorization"
        - "Content-Type"
  key_config:
    private_key_path: "/pki/signing_ec_private.pem"
    chain_path: "/pki/signing_ec_chain.pem"
  public_url: "https://vc-proxy:8443"
  registry_public_url: "https://vc-proxy:8445"
  issuer_client:
    addr: "vc-issuer:8090"
  registry_client:
    addr: "vc-registry:8090"
  auth_providers:
    oidc:
      enable: true
      issuer_url: "http://192.168.240.1:9005"
      redirect_uri: "http://192.168.240.1:8091/oidcrp/callback"
      scopes: ["openid", "profile"]
      session_duration: 300
      registration:
        preconfigured:
          enable: true
          client_id: "apigw-oidc-client"
          client_secret: "test-secret"
  data_sources:
    assertion:
      scopes:
        pid:
          auth_provider: oidc
        pid_1_5:
          auth_provider: oidc
        pid_1_8:
          auth_provider: oidc
        ehic:
          auth_provider: oidc
    datastore:
      scopes:
        diploma:
          auth_provider: oidc
          auth_claims: ["given_name", "family_name"]
  delivery:
    openid4vci:
      token_endpoint: "https://vc-proxy:8443/token"
      clients:
        "e2e-test-client":
          type: "public"
          redirect_uri: "siros-sample://callback"
          scopes:
            - "pid"
            - "pid_1_5"
            - "pid_1_8"
            - "diploma"
            - "ehic"
        "e2e-test-client-2":
          type: "public"
          redirect_uri: "http://localhost:3000/cb"
          scopes:
            - "pid"
            - "pid_1_5"
            - "pid_1_8"
            - "diploma"
            - "ehic"
    credential_offers:
      issuer_url: "https://vc-proxy:8443"
      wallets:
        local:
          label: "SIROS ID (dev)"
          redirect_uri: "http://localhost:3000/cb"
        e2e_test:
          label: "E2E Test Wallet"
          redirect_uri: "http://localhost:3000/callback"
        android:
          label: "SIROS Android (Waydroid)"
          redirect_uri: "siros-sample://callback"

# =============================================================================
# Issuer Service - OpenID4VCI Credential Issuer
# =============================================================================
issuer:
  api_server:
    addr: ":8080"
    tls:
      enable: false
  grpc_server:
    addr: ":8090"
  issuer_url: "https://vc-proxy:8443"
  registry_client:
    addr: "vc-registry:8090"
  key_config:
    private_key_path: "/pki/signing_ec_private.pem"
    chain_path: "/pki/signing_ec_chain.pem"
  jwt_attribute:
    issuer: "https://vc-proxy:8443"
    enable_not_before: true
    valid_duration: 3600
    verifiable_credential_type: "https://credential.e2etest.local/identity_credential"

# =============================================================================
# Verifier Service - OpenID4VP Verifier + OIDC Provider
# =============================================================================
verifier:
  api_server:
    addr: ":8080"
    tls:
      enable: false
  public_url: "http://localhost:9001"
  key_config:
    private_key_path: "/pki/signing_ec_private.pem"
    chain_path: "/pki/signing_ec_chain.pem"
  outbound:
    oidc_provider:
      issuer: "http://localhost:9001"
      session_duration: 900
      code_duration: 600
      access_token_duration: 3600
      id_token_duration: 3600
      refresh_token_duration: 86400
      subject_type: "pairwise"
      subject_salt: "e2e-test-salt-change-in-production"
  inbound:
    openid4vp:
      token_endpoint: "http://localhost:9001/token"
      clients:
        "e2e-test-client":
          type: "public"
          redirect_uri: "http://localhost:3000/cb"
          scopes:
            - "pid"
            - "diploma"
            - "ehic"
      supported_credentials:
        - vct: "urn:eudi:pid:arf-1.8:1"
          scopes:
            - "pid"
        - vct: "urn:eudi:pid:arf-1.5:1"
          scopes:
            - "pid"
        - vct: "urn:eudi:ehic:1"
          scopes:
            - "ehic"
        - vct: "urn:eudi:diploma:1"
          scopes:
            - "diploma"
      presentation_timeout: 300
      presentation_requests_dir: "/presentation_requests"
      preferred_vp_formats:
        "dc+sd-jwt":
          sd-jwt_alg_values: ["ES256"]
          kb-jwt_alg_values: ["ES256"]

# =============================================================================
# Registry Service - Token Status Lists and Revocation
# =============================================================================
registry:
  api_server:
    addr: ":8080"
    tls:
      enable: false
  grpc_server:
    addr: ":8090"
  public_url: "https://vc-proxy:8445"
  token_status_lists:
    key_config:
      private_key_path: "/pki/signing_ec_private.pem"
      chain_path: "/pki/signing_ec_chain.pem"
  admin_gui:
    enable: true
    password: "e2e-admin-password"
