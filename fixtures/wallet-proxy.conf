server {
    listen 8090;

    location /.well-known/assetlinks.json {
        alias /etc/nginx/well-known/assetlinks.json;
        default_type application/json;
    }

    location /api/v2/wallet {
        proxy_pass http://wallet-backend:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://wallet-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Issuer proxy — reachable from Android at http://192.168.240.1:8091
# Proxies to the internal vc-proxy (TLS termination) so the device can
# reach the issuer's authorization and consent endpoints.
server {
    listen 8091;

    # vc-proxy only exists when running with CONFORMANCE=yes. Resolve it via
    # Docker's embedded DNS through a variable (rather than a bare
    # proxy_pass) so nginx defers resolution to request time instead of
    # failing to start ("host not found in upstream") when vc-proxy is absent.
    resolver 127.0.0.11 valid=10s;

    # Internally rewrite trailing-slash requests so vc-apigw does not respond
    # with a 301 redirect (GIN's RedirectTrailingSlash).  The OIDC callback
    # redirects to /authorization/consent/#/credentials, which the browser
    # parses as path=/authorization/consent/ fragment=/credentials.  Without
    # this rewrite vc-apigw 301-redirects to /authorization/consent (without
    # the fragment), breaking the consent page's client-side routing.
    rewrite ^(/authorization/consent)/$ $1 last;

    location / {
        set $vc_proxy_upstream vc-proxy:8443;
        proxy_pass https://$vc_proxy_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host vc-proxy:8443;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
