# VC Proxy — HTTPS reverse proxy with URL rewriting for conformance testing
#
# This proxy sits in front of vc-apigw and vc-verifier, providing:
#   1. TLS termination (required by OpenID conformance suite)
#   2. Response body rewriting: replaces localhost:PORT URLs with
#      Docker-internal proxy URLs so the conformance suite can follow them
#
# Issuer:   https://vc-proxy:8443  →  http://vc-apigw:8080
# Verifier: https://vc-proxy:8444  →  http://vc-verifier:8080

worker_processes 1;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 256;
}

http {
    # Needed for sub_filter to work on JSON responses
    proxy_buffering on;

    # Docker internal DNS resolver — required so upstreams are resolved at
    # request time rather than at startup (avoids failure when upstream
    # containers start after nginx).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Issuer proxy (port 8443)
    server {
        listen 8443 ssl;
        server_name vc-proxy;

        ssl_certificate     /etc/nginx/certs/proxy_server.crt;
        ssl_certificate_key /etc/nginx/certs/proxy_server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            set $upstream_apigw http://vc-apigw:8080;
            proxy_pass $upstream_apigw;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Rewrite response bodies: replace host-mapped URLs with proxy URLs
            sub_filter_types application/json text/plain application/jwt;
            sub_filter_once off;
            sub_filter 'http://localhost:9003' 'https://vc-proxy:8443';
            sub_filter 'http://localhost:9004' 'https://vc-proxy:8445';
        }
    }

    # Verifier proxy (port 8444)
    server {
        listen 8444 ssl;
        server_name vc-proxy;

        ssl_certificate     /etc/nginx/certs/proxy_server.crt;
        ssl_certificate_key /etc/nginx/certs/proxy_server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            set $upstream_verifier http://vc-verifier:8080;
            proxy_pass $upstream_verifier;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            sub_filter_types application/json text/plain application/jwt;
            sub_filter_once off;
            sub_filter 'http://localhost:9001' 'https://vc-proxy:8444';
        }
    }

    # Registry proxy (port 8445) — for status list URLs
    server {
        listen 8445 ssl;
        server_name vc-proxy;

        ssl_certificate     /etc/nginx/certs/proxy_server.crt;
        ssl_certificate_key /etc/nginx/certs/proxy_server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            set $upstream_registry http://vc-registry:8080;
            proxy_pass $upstream_registry;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            sub_filter_types application/json text/plain;
            sub_filter_once off;
            sub_filter 'http://localhost:9004' 'https://vc-proxy:8445';
        }
    }
}
